<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERRUM ARTHANDLING METERIAL</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SheetJS (Excel Export) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- html2canvas (JPG Export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Print styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            #printable-area { 
                width: 100%; 
                margin: 0; 
                padding: 0;
            }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #ddd; padding: 8px; }
            .print-header { display: flex !important; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid black; padding-bottom: 10px;}
        }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Logo blend mode to remove white bg */
        .logo-blend {
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DUMMY INITIAL DATA ---
        const initialData = [
            {
                id: 1,
                name: "Papan MDF 15mm",
                spec: "Ukuran 122 x 244 cm, Grade A",
                qty: 10,
                unit: "Lembar",
                price: 250000,
                image: "https://via.placeholder.com/150/e2e8f0/475569?text=MDF+15mm"
            },
            {
                id: 2,
                name: "Paku Triplek",
                spec: "Ukuran 1 inch",
                qty: 5,
                unit: "Kotak",
                price: 15000,
                image: "https://via.placeholder.com/150/e2e8f0/475569?text=Paku"
            },
            {
                id: 3,
                name: "Cat Tembok Putih",
                spec: "Vinilex 5kg",
                qty: 2,
                unit: "Galon",
                price: 135000,
                image: "https://via.placeholder.com/150/e2e8f0/475569?text=Cat+Putih"
            }
        ];

        // --- MAIN APP COMPONENT ---
        const App = () => {
            // State Management - Lazy Initialization untuk mencegah race condition pada localStorage
            const [items, setItems] = useState(() => {
                try {
                    const savedData = localStorage.getItem('serrum_materials');
                    if (savedData) {
                        return JSON.parse(savedData);
                    }
                } catch (error) {
                    console.error("Gagal memuat data dari storage:", error);
                }
                return initialData;
            });
            
            const [searchTerm, setSearchTerm] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const printableRef = useRef(null);

            // Form State
            const [formData, setFormData] = useState({
                name: '', spec: '', qty: 1, unit: 'Pcs', price: 0, image: ''
            });

            // Initialize/Refresh Icons setiap kali ada perubahan render di layar
            useEffect(() => {
                lucide.createIcons();
            });

            // Save to localStorage whenever items change
            useEffect(() => {
                try {
                    localStorage.setItem('serrum_materials', JSON.stringify(items));
                } catch (error) {
                    console.error("Storage error:", error);
                    if (error.name === 'QuotaExceededError') {
                        alert("Penyimpanan browser penuh. Gambar terbaru mungkin tidak akan tersimpan secara permanen. Coba hapus beberapa data lama.");
                    }
                }
            }, [items]);

            // Formatter for IDR Currency
            const formatRupiah = (number) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
            };

            // Calculate Total Asset Value
            const totalAssetValue = items.reduce((acc, item) => acc + (item.price * item.qty), 0);

            // Filtered Items for Search
            const filteredItems = items.filter(item => 
                item.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                item.spec.toLowerCase().includes(searchTerm.toLowerCase())
            );

            // --- EXPORT / IMPORT (BACKUP & RESTORE) FUNCTIONS ---
            const handleBackupJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(items));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "Serrum_Backup_Data.json");
                document.body.appendChild(downloadAnchorNode); // Required for Firefox
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const handleRestoreJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsedData = JSON.parse(event.target.result);
                        if (Array.isArray(parsedData)) {
                            if(window.confirm('PERINGATAN: Memuat backup ini akan menimpa/mengganti data saat ini. Lanjutkan?')) {
                                setItems(parsedData);
                                alert("Data berhasil dipulihkan!");
                            }
                        } else {
                            alert("Format file tidak valid.");
                        }
                    } catch (error) {
                        alert("Gagal membaca file backup.");
                    }
                    // Reset file input
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            // --- EXPORT FUNCTIONS (EXCEL & JPG) ---
            const handleExportExcel = () => {
                // Prepare data without base64 image strings for lighter excel
                const excelData = filteredItems.map((item, index) => ({
                    'No': index + 1,
                    'Nama Material': item.name,
                    'Spesifikasi': item.spec,
                    'Kuantitas': item.qty,
                    'Satuan': item.unit,
                    'Harga Satuan': item.price,
                    'Total Harga': item.price * item.qty
                }));

                const worksheet = XLSX.utils.json_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Daftar Harga");
                XLSX.writeFile(workbook, "Serrum_Material_List.xlsx");
            };

            const handleExportJPG = () => {
                const element = printableRef.current;
                
                // Temporarily show things that might be hidden normally but needed for export
                const headerElements = element.querySelectorAll('.print-header-only');
                headerElements.forEach(el => el.style.display = 'flex');

                html2canvas(element, {
                    scale: 2, // Higher quality
                    useCORS: true, // Allow cross-origin images (like the logo)
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'Serrum_Material_List.jpg';
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();
                    
                    // Revert temporary display changes
                    headerElements.forEach(el => el.style.display = 'none');
                });
            };

            const handlePrint = () => {
                window.print();
            };

            // --- CRUD FUNCTIONS ---
            const openModal = (item = null) => {
                if (item) {
                    setEditingItem(item);
                    setFormData({ ...item });
                } else {
                    setEditingItem(null);
                    setFormData({ name: '', spec: '', qty: 1, unit: 'Pcs', price: 0, image: '' });
                }
                setIsModalOpen(true);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingItem(null);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ 
                    ...prev, 
                    [name]: name === 'qty' || name === 'price' ? Number(value) : value 
                }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 600; // Maksimal lebar gambar
                            const MAX_HEIGHT = 600; // Maksimal tinggi gambar
                            let width = img.width;
                            let height = img.height;

                            // Logika untuk resize proporsional
                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_HEIGHT) {
                                    width *= MAX_HEIGHT / height;
                                    height = MAX_HEIGHT;
                                }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // Kompres gambar menjadi format JPEG dengan kualitas 70%
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            setFormData(prev => ({ ...prev, image: compressedBase64 }));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingItem) {
                    // Update
                    setItems(items.map(item => item.id === editingItem.id ? { ...formData, id: item.id } : item));
                } else {
                    // Create
                    const newItem = { ...formData, id: Date.now() };
                    setItems([...items, newItem]);
                }
                closeModal();
            };

            const handleDelete = (id) => {
                if(window.confirm('Yakin ingin menghapus material ini?')) {
                    setItems(items.filter(item => item.id !== id));
                }
            };


            return (
                <div className="min-h-screen flex flex-col">
                    {/* TOP NAVIGATION */}
                    <header className="bg-white shadow-sm sticky top-0 z-30 no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <img 
                                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHjVP89EmhemqPCMSNOFCv6wpq9jzs6DWo4g&s" 
                                    alt="Serrum Logo" 
                                    className="h-14 w-auto logo-blend"
                                />
                                <div>
                                    <h1 className="font-bold text-xl text-gray-900 leading-tight">SERRUM ARTHANDLING</h1>
                                    <p className="text-sm font-semibold tracking-widest text-indigo-600">METERIAL SYSTEM</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className="relative">
                                    <i data-lucide="search" className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 h-4 w-4"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Cari material..." 
                                        className="pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm w-64"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <button onClick={() => openModal()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors">
                                    <i data-lucide="plus" className="h-4 w-4"></i> Tambah Data
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        
                        {/* Action Bar (Export/Print/Backup) */}
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4 no-print">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">Daftar Harga Material</h2>
                                <p className="text-gray-500 text-sm mt-1">Kelola stok, gambar, dan harga material kebutuhan arthandling.</p>
                            </div>
                            <div className="flex flex-wrap gap-2 justify-end">
                                {/* Button Backup & Restore */}
                                <button onClick={handleBackupJSON} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 shadow-sm transition-colors" title="Simpan sebagai file JSON">
                                    <i data-lucide="save" className="h-4 w-4"></i> Simpan Backup
                                </button>
                                <label className="bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 shadow-sm cursor-pointer transition-colors" title="Muat data dari file JSON">
                                    <i data-lucide="upload" className="h-4 w-4"></i> Muat Backup
                                    <input type="file" accept=".json" onChange={handleRestoreJSON} className="hidden" />
                                </label>
                                
                                <div className="hidden sm:block w-px bg-gray-300 mx-1"></div>
                                
                                {/* Existing Buttons */}
                                <button onClick={handleExportExcel} className="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors shadow-sm">
                                    <i data-lucide="download" className="h-4 w-4"></i> Excel
                                </button>
                                <button onClick={handleExportJPG} className="bg-orange-500 hover:bg-orange-600 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors shadow-sm">
                                    <i data-lucide="file-image" className="h-4 w-4"></i> JPG
                                </button>
                                <button onClick={handlePrint} className="bg-gray-800 hover:bg-gray-900 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors shadow-sm">
                                    <i data-lucide="printer" className="h-4 w-4"></i> Print
                                </button>
                            </div>
                        </div>

                        {/* Summary Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 no-print">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="bg-indigo-100 p-3 rounded-lg text-indigo-600">
                                    <i data-lucide="package" className="h-6 w-6"></i>
                                </div>
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Total Item (Jenis)</p>
                                    <p className="text-2xl font-bold text-gray-900">{items.length}</p>
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="bg-green-100 p-3 rounded-lg text-green-600">
                                    <i data-lucide="boxes" className="h-6 w-6"></i>
                                </div>
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Total Kuantitas Fisik</p>
                                    <p className="text-2xl font-bold text-gray-900">{items.reduce((acc, curr) => acc + curr.qty, 0)}</p>
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="bg-blue-100 p-3 rounded-lg text-blue-600">
                                    <i data-lucide="banknote" className="h-6 w-6"></i>
                                </div>
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Estimasi Total Aset</p>
                                    <p className="text-xl font-bold text-gray-900">{formatRupiah(totalAssetValue)}</p>
                                </div>
                            </div>
                        </div>

                        {/* TABLE AREA (Printable) */}
                        <div id="printable-area" className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden" ref={printableRef}>
                            
                            {/* Hidden Header for Print/Export only */}
                            <div className="print-header-only hidden p-6 border-b border-gray-200 items-center justify-between" style={{ display: 'none' }}>
                                <div className="flex items-center gap-4">
                                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHjVP89EmhemqPCMSNOFCv6wpq9jzs6DWo4g&s" alt="Logo" className="h-16 logo-blend" />
                                    <div>
                                        <h2 className="text-2xl font-bold">SERRUM ARTHANDLING METERIAL</h2>
                                        <p className="text-gray-500">Daftar Harga & Stok Material</p>
                                    </div>
                                </div>
                                <div className="text-right text-sm text-gray-500">
                                    Tanggal Cetak: {new Date().toLocaleDateString('id-ID')}
                                </div>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider border-b border-gray-200">
                                            <th className="px-6 py-4 font-semibold w-16 text-center">No</th>
                                            <th className="px-6 py-4 font-semibold w-24 text-center">Gambar</th>
                                            <th className="px-6 py-4 font-semibold">Detail Material</th>
                                            <th className="px-6 py-4 font-semibold text-center">Qty</th>
                                            <th className="px-6 py-4 font-semibold text-right">Harga Satuan</th>
                                            <th className="px-6 py-4 font-semibold text-right">Total</th>
                                            <th className="px-6 py-4 font-semibold text-center no-print w-28">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {filteredItems.length > 0 ? (
                                            filteredItems.map((item, index) => (
                                                <tr key={item.id} className="hover:bg-gray-50 transition-colors">
                                                    <td className="px-6 py-4 text-center text-gray-500">{index + 1}</td>
                                                    <td className="px-6 py-4 text-center">
                                                        {item.image ? (
                                                            <div className="w-16 h-16 rounded overflow-hidden border border-gray-200 mx-auto bg-gray-100 flex items-center justify-center">
                                                                <img src={item.image} alt={item.name} className="max-w-full max-h-full object-cover" />
                                                            </div>
                                                        ) : (
                                                            <div className="w-16 h-16 rounded border border-gray-200 border-dashed mx-auto bg-gray-50 flex items-center justify-center text-gray-400">
                                                                <i data-lucide="image" className="h-6 w-6"></i>
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-gray-900 text-base">{item.name}</div>
                                                        <div className="text-sm text-gray-500 mt-1">{item.spec}</div>
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        <span className="font-semibold text-gray-900">{item.qty}</span>
                                                        <span className="text-xs text-gray-500 ml-1">{item.unit}</span>
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-medium text-gray-700">
                                                        {formatRupiah(item.price)}
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-bold text-indigo-700 bg-indigo-50/30">
                                                        {formatRupiah(item.price * item.qty)}
                                                    </td>
                                                    <td className="px-6 py-4 text-center no-print">
                                                        <div className="flex items-center justify-center gap-2">
                                                            <button onClick={() => openModal(item)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition-colors" title="Edit">
                                                                <i data-lucide="edit" className="h-4 w-4"></i>
                                                            </button>
                                                            <button onClick={() => handleDelete(item.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded transition-colors" title="Hapus">
                                                                <i data-lucide="trash-2" className="h-4 w-4"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))
                                        ) : (
                                            <tr>
                                                <td colSpan="7" className="px-6 py-12 text-center text-gray-500">
                                                    <i data-lucide="box" className="h-12 w-12 mx-auto text-gray-300 mb-3"></i>
                                                    <p className="text-lg font-medium">Tidak ada material ditemukan</p>
                                                    <p className="text-sm">Silakan tambah data baru atau sesuaikan pencarian Anda.</p>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                    {/* Print Footer Summary */}
                                    <tfoot className="bg-gray-50 font-bold border-t-2 border-gray-200">
                                        <tr>
                                            <td colSpan="5" className="px-6 py-4 text-right text-gray-700">Total Estimasi Aset:</td>
                                            <td className="px-6 py-4 text-right text-indigo-700">{formatRupiah(totalAssetValue)}</td>
                                            <td className="no-print"></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    </main>

                    {/* MODAL FORM */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h3 className="text-lg font-bold text-gray-800">
                                        {editingItem ? 'Edit Data Material' : 'Tambah Material Baru'}
                                    </h3>
                                    <button onClick={closeModal} className="text-gray-400 hover:text-gray-600">
                                        <i data-lucide="x" className="h-5 w-5"></i>
                                    </button>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="p-6 overflow-y-auto">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        
                                        {/* Left Col - Image Upload */}
                                        <div className="flex flex-col">
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Foto Material / Gambar Referensi</label>
                                            <div className="flex-1 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center relative bg-gray-50 hover:bg-gray-100 transition-colors group h-48 overflow-hidden">
                                                {formData.image ? (
                                                    <div className="relative w-full h-full flex items-center justify-center p-2">
                                                        <img src={formData.image} alt="Preview" className="max-h-full max-w-full object-contain" />
                                                        <div className="absolute inset-0 bg-black bg-opacity-50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                            <span className="text-white text-sm font-medium">Klik untuk mengubah</span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="text-center p-4">
                                                        <i data-lucide="upload-cloud" className="h-8 w-8 mx-auto text-gray-400 mb-2"></i>
                                                        <span className="text-sm text-gray-500">Klik untuk upload foto<br/>(Format: JPG, PNG)</span>
                                                    </div>
                                                )}
                                                <input 
                                                    type="file" 
                                                    accept="image/*"
                                                    onChange={handleImageUpload} 
                                                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                                />
                                            </div>
                                        </div>

                                        {/* Right Col - Details */}
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Nama Material *</label>
                                                <input 
                                                    type="text" 
                                                    name="name" 
                                                    value={formData.name} 
                                                    onChange={handleInputChange} 
                                                    required 
                                                    className="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                                    placeholder="Misal: Papan MDF"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Spesifikasi Detail</label>
                                                <textarea 
                                                    name="spec" 
                                                    value={formData.spec} 
                                                    onChange={handleInputChange} 
                                                    className="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 h-20 resize-none"
                                                    placeholder="Ukuran, ketebalan, merk, dll..."
                                                ></textarea>
                                            </div>
                                        </div>

                                        {/* Full Width Bottom Row */}
                                        <div className="col-span-1 md:col-span-2 grid grid-cols-3 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Kuantitas *</label>
                                                <input 
                                                    type="number" 
                                                    name="qty" 
                                                    value={formData.qty} 
                                                    onChange={handleInputChange} 
                                                    min="0"
                                                    required 
                                                    className="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Satuan *</label>
                                                <input 
                                                    type="text" 
                                                    name="unit" 
                                                    value={formData.unit} 
                                                    onChange={handleInputChange} 
                                                    required 
                                                    className="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                                    placeholder="Lbr, Pcs, Dus..."
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Harga Satuan (Rp) *</label>
                                                <input 
                                                    type="number" 
                                                    name="price" 
                                                    value={formData.price} 
                                                    onChange={handleInputChange} 
                                                    min="0"
                                                    required 
                                                    className="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-8 flex justify-end gap-3 border-t border-gray-100 pt-4">
                                        <button type="button" onClick={closeModal} className="px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium">
                                            Batal
                                        </button>
                                        <button type="submit" className="px-4 py-2 text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 font-medium flex items-center gap-2">
                                            <i data-lucide="save" className="h-4 w-4"></i> Simpan Data
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
