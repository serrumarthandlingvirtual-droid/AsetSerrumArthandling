<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERRUM ARTHANDLING MATERIAL</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SheetJS (Excel Export) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- html2canvas (JPG Export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase modules to window so React/Babel can access them
        window.fb = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc
        };
    </script>

    <style>
        /* Print styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            #printable-area { 
                width: 100%; 
                margin: 0; 
                padding: 0;
                border: none;
                box-shadow: none;
            }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #ddd; padding: 8px; }
            .print-header-only { display: flex !important; }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .logo-blend { mix-blend-mode: multiply; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialData = [
            {
                id: "1",
                name: "Papan MDF 15mm",
                spec: "Ukuran 122 x 244 cm, Grade A",
                qty: 10,
                unit: "Lembar",
                price: 250000,
                image: ""
            }
        ];

        const App = () => {
            const [items, setItems] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isCloudMode, setIsCloudMode] = useState(false);
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            
            const [searchTerm, setSearchTerm] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const printableRef = useRef(null);

            const [formData, setFormData] = useState({
                name: '', spec: '', qty: 1, unit: 'Pcs', price: 0, image: ''
            });

            // Re-render Icons effectively
            useEffect(() => {
                lucide.createIcons();
            }, [items, isModalOpen, searchTerm, isLoading]);

            // 1. INIT FIREBASE
            useEffect(() => {
                const initFirebase = async () => {
                    // Check if run in the Cloud Environment with Firebase Config
                    if (typeof __firebase_config !== 'undefined') {
                        // Wait until module script attaches Firebase to window
                        if (!window.fb) {
                            await new Promise(r => {
                                const check = setInterval(() => {
                                    if (window.fb) { clearInterval(check); r(); }
                                }, 50);
                            });
                        }
                        
                        try {
                            const config = JSON.parse(__firebase_config);
                            const app = window.fb.initializeApp(config);
                            const fbAuth = window.fb.getAuth(app);
                            const fbDb = window.fb.getFirestore(app);
                            setDb(fbDb);

                            // Mandatory Auth before DB Access
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.fb.signInWithCustomToken(fbAuth, __initial_auth_token);
                            } else {
                                await window.fb.signInAnonymously(fbAuth);
                            }

                            window.fb.onAuthStateChanged(fbAuth, (u) => {
                                setUser(u);
                                setIsCloudMode(true);
                            });
                        } catch (err) {
                            console.error("Cloud Error, falling back to local storage:", err);
                            fallbackToLocal();
                        }
                    } else {
                        // Run Offline / Local Storage mode
                        fallbackToLocal();
                    }
                };

                const fallbackToLocal = () => {
                    setIsCloudMode(false);
                    const savedData = localStorage.getItem('serrum_materials');
                    if (savedData) setItems(JSON.parse(savedData));
                    else setItems(initialData);
                    setIsLoading(false);
                };

                initFirebase();
            }, []);

            // 2. FETCH CLOUD DATA
            useEffect(() => {
                if (!isCloudMode || !user || !db) return;
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const colRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'materials');
                
                const unsubscribe = window.fb.onSnapshot(colRef, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => {
                        data.push({ ...doc.data(), id: doc.id });
                    });
                    
                    data.sort((a, b) => a.name.localeCompare(b.name));
                    setItems(data);
                    setIsLoading(false);
                }, (error) => {
                    console.error("Error reading Cloud:", error);
                    setIsLoading(false);
                });

                return () => unsubscribe();
            }, [isCloudMode, user, db]);

            // 3. BACKUP TO LOCALSTORAGE IF OFFLINE
            useEffect(() => {
                if (!isCloudMode && !isLoading) {
                    try {
                        localStorage.setItem('serrum_materials', JSON.stringify(items));
                    } catch (error) {
                        console.warn("Storage Full.");
                    }
                }
            }, [items, isCloudMode, isLoading]);

            // Formatters & Calculations
            const formatRupiah = (number) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
            };

            const totalAssetValue = items.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const totalQty = items.reduce((acc, item) => acc + item.qty, 0);

            const filteredItems = items.filter(item => 
                item.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                item.spec.toLowerCase().includes(searchTerm.toLowerCase())
            );

            // --- EXPORT/IMPORT FUNCTIONS ---
            const handleBackupJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(items));
                const a = document.createElement('a');
                a.setAttribute("href", dataStr);
                a.setAttribute("download", "Serrum_Backup.json");
                a.click();
            };

            const handleRestoreJSON = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const parsedData = JSON.parse(event.target.result);
                        if (Array.isArray(parsedData) && window.confirm('Muat data akan menimpa/menambahkan data. Lanjut?')) {
                            if (isCloudMode && user && db) {
                                setIsLoading(true);
                                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                                const colRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'materials');
                                
                                for (const item of parsedData) {
                                    const docRef = window.fb.doc(colRef, item.id.toString());
                                    const { id, ...dataToSave } = item;
                                    await window.fb.setDoc(docRef, dataToSave);
                                }
                                alert("Data Cloud berhasil dipulihkan!");
                            } else {
                                setItems(parsedData);
                                alert("Data Lokal berhasil dipulihkan!");
                            }
                        }
                    } catch (error) {
                        alert("Gagal membaca file JSON.");
                    }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const handleExportExcel = () => {
                const excelData = filteredItems.map((item, index) => ({
                    'No': index + 1,
                    'Nama Material': item.name,
                    'Spesifikasi': item.spec,
                    'Kuantitas': item.qty,
                    'Satuan': item.unit,
                    'Harga Satuan': item.price,
                    'Total Harga': item.price * item.qty
                }));
                const worksheet = XLSX.utils.json_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Daftar Harga");
                XLSX.writeFile(workbook, "Serrum_Material_List.xlsx");
            };

            const handleExportJPG = () => {
                const element = printableRef.current;
                const headerElements = element.querySelectorAll('.print-header-only');
                headerElements.forEach(el => el.style.display = 'flex');

                html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'Serrum_Material_List.jpg';
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();
                    headerElements.forEach(el => el.style.display = 'none');
                });
            };

            const handlePrint = () => window.print();

            // --- CRUD FUNCTIONS ---
            const openModal = (item = null) => {
                if (item) {
                    setEditingItem(item);
                    setFormData({ ...item });
                } else {
                    setEditingItem(null);
                    setFormData({ name: '', spec: '', qty: 1, unit: 'Pcs', price: 0, image: '' });
                }
                setIsModalOpen(true);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingItem(null);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ 
                    ...prev, 
                    [name]: name === 'qty' || name === 'price' ? Number(value) : value 
                }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 600; 
                            let width = img.width;
                            let height = img.height;

                            if (width > height && width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            } else if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            setFormData(prev => ({ ...prev, image: compressedBase64 }));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const submitData = {
                    name: formData.name, spec: formData.spec, qty: formData.qty,
                    unit: formData.unit, price: formData.price, image: formData.image
                };

                if (isCloudMode) {
                    if (!user || !db) return alert("Koneksi cloud belum siap.");
                    try {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        const colRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'materials');
                        const idToSave = editingItem ? editingItem.id.toString() : Date.now().toString();
                        const docRef = window.fb.doc(colRef, idToSave);
                        
                        await window.fb.setDoc(docRef, submitData);
                    } catch (err) {
                        console.error("Gagal simpan:", err);
                    }
                } else {
                    if (editingItem) {
                        setItems(items.map(i => i.id === editingItem.id ? { ...submitData, id: i.id } : i));
                    } else {
                        setItems([...items, { ...submitData, id: Date.now().toString() }]);
                    }
                }
                closeModal();
            };

            const handleDelete = async (id) => {
                if(window.confirm('Yakin ingin menghapus material ini?')) {
                    if (isCloudMode) {
                        if (!user || !db) return;
                        try {
                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                            const colRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'materials');
                            await window.fb.deleteDoc(window.fb.doc(colRef, id.toString()));
                        } catch (err) {
                            console.error("Gagal hapus:", err);
                        }
                    } else {
                        setItems(items.filter(i => i.id !== id));
                    }
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* TOP NAVIGATION */}
                    <header className="bg-white shadow-sm sticky top-0 z-30 no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHjVP89EmhemqPCMSNOFCv6wpq9jzs6DWo4g&s" alt="Serrum Logo" className="h-14 w-auto logo-blend" />
                                <div>
                                    <h1 className="font-bold text-xl text-gray-900 leading-tight">SERRUM ARTHANDLING</h1>
                                    <div className="flex items-center gap-2">
                                        <p className="text-sm font-semibold tracking-widest text-indigo-600">METERIAL SYSTEM</p>
                                        <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold ${isCloudMode ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>
                                            {isCloudMode ? 'Live Sync' : 'Mode Offline'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className="relative hidden md:block">
                                    <i data-lucide="search" className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 h-4 w-4"></i>
                                    <input 
                                        type="text" placeholder="Cari material..." 
                                        className="pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm w-64"
                                        value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <button onClick={() => openModal()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors">
                                    <i data-lucide="plus" className="h-4 w-4"></i> <span className="hidden sm:inline">Tambah Data</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        
                        {/* Action Bar */}
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4 no-print">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">Daftar Harga Material</h2>
                                <p className="text-gray-500 text-sm mt-1">Kelola stok, gambar, dan harga material kebutuhan arthandling.</p>
                            </div>
                            <div className="flex flex-wrap gap-2 justify-end">
                                <button onClick={handleBackupJSON} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 shadow-sm transition-colors">
                                    <i data-lucide="save" className="h-4 w-4"></i> Simpan Backup
                                </button>
                                <label className="bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 shadow-sm cursor-pointer transition-colors">
                                    <i data-lucide="upload" className="h-4 w-4"></i> Muat Backup
                                    <input type="file" accept=".json" onChange={handleRestoreJSON} className="hidden" />
                                </label>
                                <div className="hidden sm:block w-px bg-gray-300 mx-1"></div>
                                <button onClick={handleExportExcel} className="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors shadow-sm">
                                    <i data-lucide="download" className="h-4 w-4"></i> Excel
                                </button>
                                <button onClick={handleExportJPG} className="bg-orange-500 hover:bg-orange-600 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors shadow-sm">
                                    <i data-lucide="file-image" className="h-4 w-4"></i> JPG
                                </button>
                                <button onClick={handlePrint} className="bg-gray-800 hover:bg-gray-900 text-white px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors shadow-sm">
                                    <i data-lucide="printer" className="h-4 w-4"></i> Print
                                </button>
                            </div>
                        </div>

                        {/* Summary Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 no-print">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="bg-indigo-100 p-3 rounded-lg text-indigo-600"><i data-lucide="package" className="h-6 w-6"></i></div>
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Total Item (Jenis)</p>
                                    <p className="text-2xl font-bold text-gray-900">{items.length}</p>
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="bg-green-100 p-3 rounded-lg text-green-600"><i data-lucide="boxes" className="h-6 w-6"></i></div>
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Total Kuantitas Fisik</p>
                                    <p className="text-2xl font-bold text-gray-900">{totalQty}</p>
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="bg-blue-100 p-3 rounded-lg text-blue-600"><i data-lucide="banknote" className="h-6 w-6"></i></div>
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Estimasi Total Aset</p>
                                    <p className="text-xl font-bold text-gray-900">{formatRupiah(totalAssetValue)}</p>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Search */}
                        <div className="md:hidden mb-4 relative no-print">
                            <i data-lucide="search" className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 h-4 w-4"></i>
                            <input 
                                type="text" placeholder="Cari material..." 
                                className="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
                                value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>

                        {/* TABLE AREA */}
                        <div id="printable-area" className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden" ref={printableRef}>
                            
                            {/* Hidden Print Header */}
                            <div className="print-header-only hidden p-6 border-b border-gray-200 items-center justify-between" style={{ display: 'none' }}>
                                <div className="flex items-center gap-4">
                                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHjVP89EmhemqPCMSNOFCv6wpq9jzs6DWo4g&s" alt="Logo" className="h-16 logo-blend" />
                                    <div>
                                        <h2 className="text-2xl font-bold">SERRUM ARTHANDLING MATERIAL</h2>
                                        <p className="text-gray-500">Daftar Harga & Stok Material</p>
                                    </div>
                                </div>
                                <div className="text-right text-sm text-gray-500">
                                    Tanggal Cetak: {new Date().toLocaleDateString('id-ID')}
                                </div>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider border-b border-gray-200">
                                            <th className="px-6 py-4 font-semibold w-16 text-center">No</th>
                                            <th className="px-6 py-4 font-semibold w-24 text-center">Gambar</th>
                                            <th className="px-6 py-4 font-semibold">Detail Material</th>
                                            <th className="px-6 py-4 font-semibold text-center">Qty</th>
                                            <th className="px-6 py-4 font-semibold text-right">Harga Satuan</th>
                                            <th className="px-6 py-4 font-semibold text-right">Total</th>
                                            <th className="px-6 py-4 font-semibold text-center no-print w-28">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {isLoading ? (
                                            <tr>
                                                <td colSpan="7" className="px-6 py-12 text-center text-gray-500">
                                                    <div className="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-indigo-600 rounded-full mb-3"></div>
                                                    <p className="text-sm font-medium">Memuat data dari cloud...</p>
                                                </td>
                                            </tr>
                                        ) : filteredItems.length > 0 ? (
                                            filteredItems.map((item, index) => (
                                                <tr key={item.id} className="hover:bg-gray-50 transition-colors">
                                                    <td className="px-6 py-4 text-center text-sm text-gray-500">{index + 1}</td>
                                                    <td className="px-6 py-4 text-center">
                                                        {item.image ? (
                                                            <img src={item.image} alt={item.name} className="h-12 w-12 object-cover rounded mx-auto shadow-sm border" />
                                                        ) : (
                                                            <div className="h-12 w-12 bg-gray-100 rounded flex items-center justify-center mx-auto text-gray-400">
                                                                <i data-lucide="image" className="h-5 w-5"></i>
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="font-semibold text-gray-900">{item.name}</div>
                                                        <div className="text-sm text-gray-500">{item.spec}</div>
                                                    </td>
                                                    <td className="px-6 py-4 text-center font-medium">
                                                        {item.qty} {item.unit}
                                                    </td>
                                                    <td className="px-6 py-4 text-right text-sm">
                                                        {formatRupiah(item.price)}
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-bold text-gray-900">
                                                        {formatRupiah(item.price * item.qty)}
                                                    </td>
                                                    <td className="px-6 py-4 text-center no-print">
                                                        <div className="flex justify-center gap-2">
                                                            <button onClick={() => openModal(item)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition-colors" title="Edit">
                                                                <i data-lucide="edit" className="h-4 w-4"></i>
                                                            </button>
                                                            <button onClick={() => handleDelete(item.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded transition-colors" title="Hapus">
                                                                <i data-lucide="trash-2" className="h-4 w-4"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))
                                        ) : (
                                            <tr>
                                                <td colSpan="7" className="px-6 py-12 text-center text-gray-500">
                                                    <i data-lucide="inbox" className="h-12 w-12 mx-auto text-gray-300 mb-3"></i>
                                                    <p className="text-lg font-medium text-gray-900">Tidak ada data ditemukan</p>
                                                    <p className="text-sm">Silakan tambah material baru atau sesuaikan pencarian Anda.</p>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {/* MODAL TAMBAH/EDIT */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-center items-center p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h3 className="font-bold text-lg text-gray-800">{editingItem ? 'Edit Material' : 'Tambah Material Baru'}</h3>
                                    <button onClick={closeModal} className="text-gray-400 hover:text-gray-600">
                                        <i data-lucide="x" className="h-5 w-5"></i>
                                    </button>
                                </div>
                                <div className="p-5 overflow-y-auto">
                                    <form id="materialForm" onSubmit={handleSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Nama Material *</label>
                                            <input required type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Spesifikasi Detail</label>
                                            <input type="text" name="spec" value={formData.spec} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Misal: Ukuran, Warna, Merek..."/>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Kuantitas *</label>
                                                <input required type="number" min="1" name="qty" value={formData.qty} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Satuan</label>
                                                <select name="unit" value={formData.unit} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                                                    <option value="Pcs">Pcs</option>
                                                    <option value="Lembar">Lembar</option>
                                                    <option value="Box">Box</option>
                                                    <option value="Roll">Roll</option>
                                                    <option value="Set">Set</option>
                                                    <option value="Meter">Meter</option>
                                                    <option value="Liter">Liter</option>
                                                    <option value="Kg">Kg</option>
                                                    <option value="Lusin">Lusin</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Harga Satuan (Rp) *</label>
                                            <input required type="number" min="0" name="price" value={formData.price} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Foto/Gambar (Opsional)</label>
                                            <input type="file" accept="image/*" onChange={handleImageUpload} className="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"/>
                                            {formData.image && (
                                                <div className="mt-3 relative inline-block">
                                                    <img src={formData.image} alt="Preview" className="h-24 w-24 object-cover rounded-lg shadow-sm border border-gray-200" />
                                                    <button type="button" onClick={() => setFormData({...formData, image: ''})} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow hover:bg-red-600 transition-colors">
                                                        <i data-lucide="x" className="h-3 w-3"></i>
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </form>
                                </div>
                                <div className="p-5 border-t border-gray-100 flex justify-end gap-3 bg-gray-50">
                                    <button type="button" onClick={closeModal} className="px-4 py-2 text-gray-600 font-medium hover:bg-gray-200 rounded-lg transition-colors">Batal</button>
                                    <button type="submit" form="materialForm" className="px-4 py-2 bg-indigo-600 text-white font-medium hover:bg-indigo-700 rounded-lg shadow-sm flex items-center gap-2 transition-colors">
                                        <i data-lucide="save" className="h-4 w-4"></i> Simpan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
